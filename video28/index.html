<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS position property</title>
    <style>
        * {
            margin: 0%;
            padding: 0%;
        }

        .box {
            height: 433px;
            width: 80vw;
            padding: 3px;
            margin: 3px;
            border: 2px solid black;
        }

        .box1 {
            background-color: aqua;
           /* position: relative;
             top: 50px;
             left: 15px; */
            /* position: absolute;
             left: 56px;
             top: 42px; */
             position: sticky;
             margin: 0%;
             padding: 0%;
             height: 111px;
             width: 100%;
             top: 0px;
        }

        .box2 {
            background-color: blueviolet;
        }

        .box3 {
            background-color: brown;
          /*  position: fixed;
            left: 142px;
            bottom: 206px;*/
        }

        .box4 {
            background-color: palevioletred;
        }
        .parent{
            background-color: yellow;
            margin: 3px;
            padding: 3px;
            border: 2px solid rgb(5, 5, 67);
            position: absolute;
        }
    </style>
</head>

<body>
    <div class="parent">
        <div class="box box1"></div>
        <div class="box box2"></div>
        <div class="box box3"></div>
        <div class="box box4"></div>
    </div>
</body>

</html>
