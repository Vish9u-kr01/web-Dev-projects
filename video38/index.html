<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>css flexbox</title>
    <style>
        .container {
            display: flex;
            border: 2px solid red;
            height: 90vw;
            /* justify-content: center;*/
            /* align-items: center;*/
            align-content: flex-start;
            flex-direction: row;
            /* flex-wrap: wrap;*/
            flex-flow: wrap;
            gap: 40px 10px;

        }

        .item {
            width: 80px;
            height: 50px;
            border: 2px solid black;
            margin: 4px;
            background-color: blueviolet;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>

    </div>
</body>

</html>
