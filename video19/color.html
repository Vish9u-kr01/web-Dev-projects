<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colors</title>
    <style>
        *{
            background-color:purple;
        }
   p{
    background-color: rgb(11, 173, 173);
    color: #d4eb05;
   }
   h1{
   background-color: blue;
   color: hsla(hue, saturation, lightness, alpha);
   }


    </style>
</head>
<body>
    <div>
         <h1>colors in CSS</h1>
         <p>there are five types of color codes:</p>
         <ol>
               <li>color keywords</li>
               <li>hexa code</li>
               <li>rgb</li>
               <li>rgba</li>
               <li>hsl</li>


         </ol>


    </div>
</body>
</html>
