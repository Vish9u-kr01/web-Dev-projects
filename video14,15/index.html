<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inline,Internal,External CSS</title>
    <style>
        div,
        p {
            color: white;
            background-color: blue;
        }
        article {
            background-color: red;
        }
    </style>
</head>

<body>
    <h1>There are 3 Types of CSS in HTML</h1>
    Inline CSS
    <p style="background-color: blue;color:wheat;">yes I am inline</p>
    <p style="color: azure; background-color: aqua;">yes I am also inline</p>
    Internal CSS
    <p>yes I am Internal CSS</p>
    <div>
        I am div element
    </div>
    External CSS
    <article>Yes I am external and I am style by an External CSS file which i have done in next videos</article>

</body>

</html>
