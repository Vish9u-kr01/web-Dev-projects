<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS shadow and outline</title>
    <style>
        .box {
            border: 2px solid black;
            padding: 40px;
            box-shadow: 5px 10px 15px 5px red;
        }

        .box1 {
            border: 2px solid black;
            padding: 40px;
            box-shadow: 5px 10px 15px 5px red inset;
            margin: 100px;
            width: 344px;
        }
        .text{
            text-shadow: 2px 2px 4px rgb(9, 233, 9);
        }
    </style>
</head>

<body>
    <div class="box">
        I am a box
    </div>
    <div class="box1">
        i am another box
    </div>
    <p class="text">
        Lorem ipsum dolor sit, amet consectetur adipisicing elit. Illo exercitationem assumenda unde veritatis sint
        accusantium ad pariatur quisquam quos impedit.
    </p>
</body>

</html>
