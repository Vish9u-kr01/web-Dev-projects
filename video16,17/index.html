<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=
    , initial-scale=1.0">
    <title>CSS Selector</title>
    <style>
       /*  Element selector*/
div{
    background-color: rgb(200, 10, 162);
    color: black;
}
     /*class selector*/
.red{
    background-color: aqua;
    color: azure;
}
     /*  id selector*/
#green{
    background-color: blue;
}  
       /*child selector*/
article>p{
       background-color: red;
       } 
      /* descendent selector*/
      div p{
        background-color: gold;
      } 
     /* universal selector*/
     *{
        background-color: aqua;
        margin: 0;
        padding: 0;
     }
     /*pseudo selector*/
     a:visited{
       color: rgb(5, 5, 132);
     }
     a:link{
        color: green;
     }
     a:active{
        background-color: red;
     }
      a:hover{
        color: mediumvioletred;
      }
      p:first-child{
        background-color: black;
        color: white;
      }
    </style>
</head>
<body>
    <div>yes i am div</div>
    <div>
      <p>I am first child </p>
      <p>i am second child </p>
    </div>
    <div class="red">I am div1</div>
    <div id="green">I am div2</div>
    <div> <article>
       <p>i am para and  descendent of div</p>
    </article>
</div>
        <a href="https:\\www.google.com">open Google</a>
        <br>
        <a href="https:\\www.facebook.com">open Facebook</a>
</body>
</html>
