<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Netflix India</title>
</head>
<body>
    <header>
        <div class="logo">Netflix</div>
        <nav>
            <ul>
                <li>Home</li>
                <li>TV Shows</li>
                <li>Movies</li>
                <li>Latest</li>
                <li>My List</li>
            </ul>
        </nav>
    </header>
    <main>
        <section class="banner">
          <span><h1>Watch Unlimited Movies, TV Shows, and More</h1><span>
            <h3>Starts at rs 149.Cancel any time</h3> 
            <h4>Ready to watch? Enter your email to create or restart your membership.</h4>
            <input class="text "text" placeholder="Email Address">
            <button class="btn">Get Started</button>
        </section>
        <section class="content">
            <h2>Trending Now</h2>
            <div class="movie-row">
                <div class="movie movie1"></div>
                <div class="movie movie2"></div>
                <div class="movie movie3"></div>
                <div class="movie movie4"></div>
                <div class="movie movie5"></div>
            </div>
        </section>
    </main>
    <footer>
        <pre>           &copy; Copyright 2024-25 | All Rights Reserved | Netflix India   </pre>
    </footer>
</body>
</html>
