<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
         .card {
            display: flex;
            margin: 5px;
            border: 2px solid black;
            width: 900px;
            justify-content: center;
            align-items: center;
            padding: 12px;
        }
        .image img {
            width: 200px;
        }

        .text h1,
        p {
            padding: 2px 0;
        }

        .image {
            position: relative;
        }

        .image .capsule {
            position: absolute;
            bottom: 4px;
            z-index: 10;
            right: 5px;
            background: #242020;
            opacity: 0.9;
            color: white;
            padding: 3px;
            border-radius: 3px;
            font-size: 14px;
        }


    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="image">
                <img  style=" margin-inline-start:-270px;" src="https://codewithharry.nyc3.cdn.digitaloceanspaces.com/assets/090fefe24d23d47584f6ddc7eb5a241e.png" alt="">
                    <div class="capsule">31:06</div>
            </div>
            <div class="text">
                <h1>Introduction to Express js</h1>
                <p>.CodeWithHarry  .564kviews  .9Month ago</p>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
